# ============================================================
# application.yml — Configuração principal da aplicação
# ============================================================
# Spring Boot carrega este arquivo automaticamente ao iniciar.
# Configurações aqui são compartilhadas entre TODOS os profiles.
# Valores específicos de cada ambiente vão em application-{profile}.yml
#
# Profiles disponíveis:
# - dev: desenvolvimento local (Docker Compose)
# - test: testes automatizados (Testcontainers)
# - prod: produção (variáveis de ambiente)
# ============================================================

spring:
  application:
    # Nome da aplicação — aparece nos logs e no Actuator /info
    name: pixhub

  profiles:
    # Profile ativo padrão. Se nenhum for especificado, usa "dev".
    # Em produção, sobrescrever com: SPRING_PROFILES_ACTIVE=prod
    active: dev

  jpa:
    # open-in-view=false: desabilita o padrão "Open Session in View".
    # Por quê? Com open-in-view=true (padrão), a sessão do Hibernate
    # fica aberta durante toda a request HTTP, incluindo a renderização.
    # Isso causa queries N+1 acidentais e acoplamento com a camada web.
    # Em APIs REST, sempre desabilitar.
    open-in-view: false

    hibernate:
      # ddl-auto=validate: Hibernate apenas VALIDA se as entidades
      # batem com o schema do banco, mas NÃO altera o banco.
      # Quem altera o banco são as migrations do Flyway.
      # Opções: none, validate, update, create, create-drop
      # Em produção, NUNCA usar update/create (pode perder dados).
      ddl-auto: validate

    properties:
      hibernate:
        # Dialeto específico para PostgreSQL — diz ao Hibernate
        # como gerar SQL otimizado para PostgreSQL.
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    # Habilita Flyway para rodar migrations automaticamente ao iniciar.
    # Migrations ficam em: src/main/resources/db/migration/
    enabled: true

# ============================================================
# Actuator — Endpoints de monitoramento
# ============================================================
management:
  endpoints:
    web:
      exposure:
        # Expõe apenas health e info por segurança.
        # Em produção, nunca expor "env" ou "beans" (vazam dados sensíveis).
        include: health,info

  endpoint:
    health:
      # show-details=when-authorized: mostra detalhes do health
      # (status do banco, Kafka, disk space) apenas para usuários autenticados.
      show-details: when-authorized

# ============================================================
# SpringDoc/Swagger — Documentação automática da API
# ============================================================
# ============================================================
# JWT — Configuração de tokens de autenticação
# ============================================================
# Valores padrão para todos os profiles. Em produção, a secret
# DEVE ser sobrescrita via variável de ambiente (NUNCA usar a padrão).
jwt:
  # Chave secreta usada para assinar os tokens JWT.
  # HMAC-SHA256 exige mínimo 256 bits (32 bytes).
  # Em produção: JWT_SECRET=<chave aleatória de 64+ caracteres>
  secret: ${JWT_SECRET:default-dev-secret-que-deve-ser-trocada-em-producao-min-256-bits!!}
  # Tempo de vida do access token em milissegundos.
  # 15 minutos = 900000ms — curto o suficiente para limitar danos se o token vazar.
  access-token-expiration: 900000
  # Tempo de vida do refresh token em milissegundos.
  # 7 dias = 604800000ms — o usuário não precisa fazer login toda hora.
  refresh-token-expiration: 604800000

# ============================================================
# Encryption — Criptografia de dados sensíveis (AES-256-GCM)
# ============================================================
# Protege CPF/CNPJ e chaves PIX armazenados no banco de dados.
# Mesmo que o banco seja comprometido (SQL injection, backup vazado),
# os dados ficam ilegíveis sem a chave de criptografia.
#
# A chave DEVE ser substituída em produção via variável de ambiente:
#   ENCRYPTION_KEY=<resultado de: openssl rand -base64 32>
#
# IMPORTANTE: se a chave for alterada após dados serem salvos,
# os dados antigos ficam irrecuperáveis (não há migração automática).
encryption:
  key: ${ENCRYPTION_KEY:dGhpc0lzQURldktleUZvclRlc3RpbmdPbmx5MTIzNDU=}

# ============================================================
# Rate Limiting — Controle de requisições por minuto
# ============================================================
# Protege a API contra abuso e brute force.
# Cada tipo de endpoint tem um limite diferente baseado no risco:
# - Auth (login): apertado → impede brute force de senhas
# - Transações: moderado → operações financeiras são caras
# - Consultas: relaxado → leitura é barata
rate-limit:
  enabled: true
  # Endpoints de auth (/api/v1/auth/**) — limite por IP
  auth-requests-per-minute: 5
  # Endpoints de transação (POST/PUT /api/v1/transactions/**) — limite por usuário
  transaction-requests-per-minute: 30
  # Endpoints de consulta (GET /api/v1/**) — limite por usuário
  query-requests-per-minute: 60

springdoc:
  api-docs:
    # Endpoint que retorna o JSON da especificação OpenAPI.
    # Ferramentas de geração de código (como openapi-generator) consomem este endpoint.
    path: /api-docs
  swagger-ui:
    # URL da interface visual Swagger UI.
    # Acesse no navegador para testar endpoints interativamente.
    path: /swagger-ui.html
